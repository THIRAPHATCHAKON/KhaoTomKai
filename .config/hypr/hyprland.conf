$mainMod = SUPER

monitor=,preferred,auto,1

exec-onec = waybar

bind = $mainMod, Q, exec, kitty
bind = $mainMod, E, killactive
bind = $mainMod, M, exit
bind = $mainMod, R, exec, rofi -show drun

exec-once = hyprpaper
exec-once = waybar
exec-once = swaync
input {
	kb_layout = us
}

general {
	gaps_in = 5
	gaps_out = 10
	border_size = 2
}

decoration {
	rounding = 8
}
