$mainMod = SUPER

monitor=,preferred,auto,1

exec-onec = waybar

bind = $mainMod, Q, exec, kitty
bind = $mainMod, E, killactive
bind = $mainMod, M, exit
bind = $mainMod, R, exec, ~/.config/rofi/launchers/type-2/launcher.sh || pkill  rofi

bind = $mainMod, R, exec, ~/.config/waybar/scripts/launch.sh
exec-once = hyprpaper
exec-once = waybar
exec-once = swaync
input {
	kb_layout = us
}

general {
	gaps_in = 5
	gaps_out = 10
	border_size = 2

	col.active_border = rgba(56b6c2aa)
	col.inactive_border = rgba(595959aa)
}

decoration {
	rounding = 8
}
